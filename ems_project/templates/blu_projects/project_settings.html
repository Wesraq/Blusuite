{% extends 'blu_projects/base_projects.html' %}

{% block title %}Settings - BLU Projects{% endblock %}

{% block content %}
<!-- Breadcrumb -->
<div style="font-size: 12px; color: #64748b; margin-bottom: 16px; display: flex; align-items: center; gap: 4px;">
    <a href="{% url 'blu_projects:projects_list' %}" style="color: #64748b; text-decoration: none;">Projects</a>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    <span style="color: #0f172a;">Settings</span>
</div>

<!-- Header -->
<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
    <div style="width: 36px; height: 36px; border-radius: 4px; background: #dbeafe; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </div>
    <div>
        <h2 style="margin: 0 0 2px; font-size: 20px; font-weight: 700; color: #0f172a;">Project Settings</h2>
        <p style="margin: 0; font-size: 13px; color: #64748b;">Configure project module preferences</p>
    </div>
</div>

<div style="max-width: 640px;">
    <!-- General Settings -->
    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 16px;">
        <div style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <h3 style="margin: 0; font-size: 13px; font-weight: 700; color: #0f172a;">General Settings</h3>
        </div>
        <div style="padding: 16px 20px;">
            <div style="margin-bottom: 12px;">
                <label style="display: block; margin-bottom: 2px; font-size: 12px; font-weight: 600; color: #0f172a;">Company Name</label>
                <p style="margin: 0; font-size: 13px; color: #64748b;">{{ company.name }}</p>
            </div>
            <div style="margin-bottom: 12px;">
                <label style="display: block; margin-bottom: 2px; font-size: 12px; font-weight: 600; color: #0f172a;">Default Project Status</label>
                <p style="margin: 0; font-size: 13px; color: #64748b;">Planning</p>
            </div>
            <div>
                <label style="display: block; margin-bottom: 2px; font-size: 12px; font-weight: 600; color: #0f172a;">Default Task Priority</label>
                <p style="margin: 0; font-size: 13px; color: #64748b;">Medium</p>
            </div>
        </div>
    </div>

    <!-- Notifications -->
    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 16px;">
        <div style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <h3 style="margin: 0; font-size: 13px; font-weight: 700; color: #0f172a;">Notifications</h3>
        </div>
        <div style="padding: 16px 20px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #0f172a; margin-bottom: 10px; cursor: pointer;">
                <input type="checkbox" checked style="accent-color: #1d4ed8;"> Email notifications for new tasks
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #0f172a; margin-bottom: 10px; cursor: pointer;">
                <input type="checkbox" checked style="accent-color: #1d4ed8;"> Email notifications for task updates
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #0f172a; cursor: pointer;">
                <input type="checkbox" style="accent-color: #1d4ed8;"> Daily task summary
            </label>
        </div>
    </div>

    <!-- Time Tracking -->
    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 16px;">
        <div style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            <h3 style="margin: 0; font-size: 13px; font-weight: 700; color: #0f172a;">Time Tracking</h3>
        </div>
        <div style="padding: 16px 20px;">
            <div style="margin-bottom: 12px;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #0f172a;">Default Hourly Rate</label>
                <input type="number" value="0.00" step="0.01" placeholder="0.00" style="width: 200px; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; font-family: inherit;">
            </div>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #0f172a; cursor: pointer;">
                <input type="checkbox" checked style="accent-color: #1d4ed8;"> Require time entry descriptions
            </label>
        </div>
    </div>

    <!-- Actions -->
    <div style="display: flex; gap: 8px; padding-top: 8px;">
        <button style="padding: 8px 20px; background: #1d4ed8; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Save Settings
        </button>
        <button style="padding: 8px 20px; background: white; border: 1px solid #e2e8f0; color: #475569; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;">
            Cancel
        </button>
    </div>
</div>
{% endblock %}
