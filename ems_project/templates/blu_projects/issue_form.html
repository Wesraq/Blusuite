{% extends 'blu_projects/base_projects.html' %}

{% block title %}Report Issue - {{ project.name }}{% endblock %}

{% block content %}
<!-- Breadcrumb -->
<div style="font-size: 12px; color: #64748b; margin-bottom: 16px; display: flex; align-items: center; gap: 4px;">
    <a href="{% url 'blu_projects:projects_list' %}" style="color: #64748b; text-decoration: none;">Projects</a>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    <a href="{% url 'blu_projects:project_detail' project.id %}" style="color: #1d4ed8; text-decoration: none;">{{ project.name }}</a>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
    <span style="color: #0f172a;">Report Issue</span>
</div>

<!-- Header -->
<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
    <div style="width: 36px; height: 36px; border-radius: 4px; background: #dbeafe; display: flex; align-items: center; justify-content: center;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    </div>
    <div>
        <h2 style="margin: 0 0 2px; font-size: 20px; font-weight: 700; color: #0f172a;">Report Issue</h2>
        <p style="margin: 0; font-size: 13px; color: #64748b;">{{ project.name }}</p>
    </div>
</div>

<form method="post" style="max-width: 640px;">
    {% csrf_token %}
    <div style="background: white; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 16px;">
        <div style="padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
            <h3 style="margin: 0; font-size: 13px; font-weight: 700; color: #0f172a;">Issue Details</h3>
        </div>
        <div style="padding: 20px;">
            <div style="margin-bottom: 14px;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #0f172a;">Issue Title <span style="color: #dc2626;">*</span></label>
                <input type="text" name="title" required placeholder="Brief description of the issue" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; font-family: inherit;">
            </div>
            <div style="margin-bottom: 14px;">
                <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #0f172a;">Description <span style="color: #dc2626;">*</span></label>
                <textarea name="description" rows="6" required placeholder="Detailed description of the issue" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; font-family: inherit; resize: vertical;"></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #0f172a;">Priority</label>
                    <select name="priority" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer;">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                        <option value="CRITICAL">Critical</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #0f172a;">Category</label>
                    <select name="category" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer;">
                        <option value="BUG">Bug/Error</option>
                        <option value="FEATURE">Feature Request</option>
                        <option value="SUPPORT" selected>Support Question</option>
                        <option value="MAINTENANCE">Maintenance</option>
                        <option value="PERFORMANCE">Performance Issue</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div style="display: flex; gap: 8px; padding-top: 8px;">
        <button type="submit" style="padding: 8px 20px; background: #1d4ed8; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; font-family: inherit;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            Submit Issue
        </button>
        <a href="{% url 'blu_projects:client_project_view' project.id %}" style="padding: 8px 20px; background: white; border: 1px solid #e2e8f0; color: #475569; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center;">
            Cancel
        </a>
    </div>
</form>
{% endblock %}
