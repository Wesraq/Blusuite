{% extends 'base.html' %}
{% block title %}Access Denied — BLU Suite{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px;">
    <div style="width:80px;height:80px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin-bottom:24px;">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
    </div>
    <h1 style="font-size:2rem;font-weight:700;color:#111;margin-bottom:8px;">Access Denied</h1>
    <p style="color:#6b7280;font-size:1rem;max-width:420px;line-height:1.6;">
        You don't have the necessary permissions to view this page.
        If you believe this is an error, contact your administrator.
    </p>
    <div style="margin-top:32px;display:flex;gap:12px;">
        <a href="javascript:history.back()"
           style="padding:10px 20px;background:#f3f4f6;color:#374151;border-radius:8px;text-decoration:none;font-weight:500;">
            &larr; Go Back
        </a>
        <a href="{% url 'dashboard_redirect' %}"
           style="padding:10px 20px;background:#1d4ed8;color:#fff;border-radius:8px;text-decoration:none;font-weight:500;">
            Dashboard
        </a>
    </div>
</div>
{% endblock %}
