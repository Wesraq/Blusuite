<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | EMS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            padding: 60px 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 120px;
            margin-bottom: 20px;
            animation: shake 1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 600;
            color: #111827;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: #000000;
            color: white;
            border: 2px solid #000000;
        }

        .btn-primary:hover {
            background: #333333;
            border-color: #333333;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: white;
            color: #000000;
            border: 2px solid #e5e7eb;
        }

        .btn-secondary:hover {
            background: #f9fafb;
            border-color: #000000;
            transform: translateY(-2px);
        }

        .info-box {
            margin-top: 40px;
            padding: 20px;
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            border-radius: 10px;
            text-align: left;
        }

        .info-box h3 {
            font-size: 16px;
            color: #991b1b;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .info-box p {
            font-size: 14px;
            color: #7f1d1d;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .error-card {
                padding: 40px 24px;
            }

            .error-code {
                font-size: 56px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-message {
                font-size: 16px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card">
            <div class="error-icon">⚠️</div>
            <div class="error-code">500</div>
            <h1 class="error-title">Server Error</h1>
            <p class="error-message">
                Something went wrong on our end. We're working to fix it. Please try again later.
            </p>

            <div class="action-buttons">
                <a href="/" class="btn btn-primary">Go to Homepage</a>
                <a href="javascript:location.reload()" class="btn btn-secondary">Refresh Page</a>
            </div>

            <div class="info-box">
                <h3>What can you do?</h3>
                <p>
                    • Try refreshing the page<br>
                    • Go back to the homepage<br>
                    • Contact support if the problem persists<br>
                    • Our team has been notified and is working on it
                </p>
            </div>
        </div>
    </div>
</body>
</html>
