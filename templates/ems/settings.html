{% extends 'ems/base_employer.html' %}

{% block title %}Settings & Configuration - EMS{% endblock %}

{% block nav_settings %}active{% endblock %}

{% block extra_css %}
<style>
.settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
}

.setting-card {
    background: white;
    padding: 24px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    transition: all 0.2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
}
            <button class="tab-btn" onclick="showTab('notifications')">Notifications</button>
            <button class="tab-btn" onclick="showTab('integrations')">Integrations</button>
            <button class="tab-btn" onclick="showTab('maintenance')">Maintenance</button>
        </div>

        <div class="card-content">
            <!-- General Settings Tab -->
            <div id="general" class="tab-content active">
                <div class="content-grid">
                    <div class="content-card">
                        <div class="card-header">
                            <div class="card-title">System Information</div>
                            <div class="card-subtitle">Basic system configuration</div>
                        </div>
                        <div class="card-content">
                            <div class="form-group">
                                <label for="systemName">System Name</label>
                                <div class="form-hint">The name of your EMS instance</div>
                                <input type="text" id="systemName" value="Employee Management System" placeholder="Enter system name">
                            </div>

                            <div class="form-group">
                                <label for="orgName">Organization Name</label>
                                <div class="form-hint">Your organization or company name</div>
                                <input type="text" id="orgName" value="" placeholder="Enter organization name">
                            </div>

                            <div class="form-group">
                                <label for="defaultTimezone">Default Timezone</label>
                                <div class="form-hint">Set the default timezone for the system</div>
                                <select id="defaultTimezone">
                                    <option value="UTC">UTC</option>
                                    <option value="America/New_York" selected>America/New_York</option>
                                    <option value="Europe/London">Europe/London</option>
                                    <option value="Asia/Tokyo">Asia/Tokyo</option>
                                    <option value="Australia/Sydney">Australia/Sydney</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="content-card">
                        <div class="card-header">
                            <div class="card-title">Business Hours</div>
                            <div class="card-subtitle">Configure working hours and days</div>
                        </div>
                        <div class="card-content">
                            <div class="form-group">
                                <label>Work Days</label>
                                <div class="form-hint">Select which days are considered work days</div>
                                <div class="checkbox-group">
                                    <label><input type="checkbox" checked> Monday</label>
                                    <label><input type="checkbox" checked> Tuesday</label>
                                    <label><input type="checkbox" checked> Wednesday</label>
                                    <label><input type="checkbox" checked> Thursday</label>
                                    <label><input type="checkbox" checked> Friday</label>
                                    <label><input type="checkbox"> Saturday</label>
                                    <label><input type="checkbox"> Sunday</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="workStart">Work Start Time</label>
                                <input type="time" id="workStart" value="09:00">
                            </div>

                            <div class="form-group">
                                <label for="workEnd">Work End Time</label>
                                <input type="time" id="workEnd" value="17:00">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="resetGeneralSettings()">Reset to Defaults</button>
                    <button class="btn btn-primary" onclick="saveGeneralSettings()">Save Changes</button>
                </div>
            </div>

            <!-- Other tabs will be loaded here -->
            <div id="security" class="tab-content" style="display: none;">
                <!-- Security settings content will be loaded here -->
            </div>

            <div id="notifications" class="tab-content" style="display: none;">
                <!-- Notification settings content will be loaded here -->
            </div>

            <div id="integrations" class="tab-content" style="display: none;">
                <!-- Integration settings content will be loaded here -->
            </div>

            <div id="maintenance" class="tab-content" style="display: none;">
                <!-- Maintenance settings content will be loaded here -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Tab navigation
    function showTab(tabName) {
        // Hide all tab contents
        document.querySelectorAll('.tab-content').forEach(tab => {
            tab.style.display = 'none';
        });

        // Remove active class from all tab buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        // Show the selected tab content
        document.getElementById(tabName).style.display = 'block';

        // Add active class to the clicked tab button
        event.target.classList.add('active');
    }

    // General settings functions
    function saveGeneralSettings() {
        // Add your save logic here
        alert('Settings saved successfully!');
    }

    function resetGeneralSettings() {
        // Add your reset logic here
        if (confirm('Are you sure you want to reset to default settings?')) {
            // Reset form fields
            document.getElementById('systemName').value = 'Employee Management System';
            document.getElementById('orgName').value = '';
            // Add more field resets as needed
        }
    }

    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
        // Any initialization code can go here
    });
</script>
{% endblock %}
