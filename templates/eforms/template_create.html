{% extends 'ems/base_employer.html' %}

{% block title %}Create Form Template - EMS{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-content">
        <h1 class="page-title">Create Form Template</h1>
        <p class="page-subtitle">Set up a new digital form</p>
    </div>
    <div class="page-header-actions">
        <a href="{% url 'form_templates_list' %}" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; color: #475569; text-decoration: none; font-size: 14px; font-weight: 500;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            Back to Templates
        </a>
    </div>
</div>

<div class="content-card">
    <div class="card-header">
        <div class="card-title">Template Details</div>
    </div>
    <div class="card-content">
        <form method="POST">
            {% csrf_token %}
            
            <div style="display: grid; gap: 20px;">
                <!-- Title -->
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">
                        Template Title <span style="color: #ef4444;">*</span>
                    </label>
                    <input type="text" name="title" required 
                           placeholder="e.g., Employee Exit Form, Leave Application"
                           style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">
                </div>
                
                <!-- Description -->
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">
                        Description
                    </label>
                    <textarea name="description" rows="3" 
                              placeholder="Describe the purpose of this form..."
                              style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical;"></textarea>
                </div>
                
                <!-- Category -->
                <div>
                    <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">
                        Category <span style="color: #ef4444;">*</span>
                    </label>
                    <select name="category" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">
                        {% for value, label in categories %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <!-- Settings -->
                <div style="padding: 20px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                    <h3 style="font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 16px;">Form Settings</h3>
                    
                    <div style="display: grid; gap: 16px;">
                        <!-- Requires Signature -->
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" name="requires_signature" 
                                   style="width: 18px; height: 18px; cursor: pointer;">
                            <div>
                                <div style="font-weight: 500; color: #1e293b;">Require E-Signature</div>
                                <div style="font-size: 13px; color: #64748b;">Require users to electronically sign this form</div>
                            </div>
                        </label>
                        
                        <!-- Requires Approval -->
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" name="requires_approval" id="requires_approval"
                                   onchange="toggleApproverRole()"
                                   style="width: 18px; height: 18px; cursor: pointer;">
                            <div>
                                <div style="font-weight: 500; color: #1e293b;">Require Approval</div>
                                <div style="font-size: 13px; color: #64748b;">Form submissions must be approved before completion</div>
                            </div>
                        </label>
                        
                        <!-- Approver Role (conditionally shown) -->
                        <div id="approver-role-field" style="display: none; margin-left: 30px;">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">
                                Approver Role
                            </label>
                            <select name="approver_role"
                                    style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">
                                <option value="">Any HR or Admin</option>
                                <option value="HR">HR Only</option>
                                <option value="SUPERVISOR">Supervisor Only</option>
                                <option value="ACCOUNTANT">Accountant Only</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <!-- Submit Button -->
                <div style="display: flex; gap: 12px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
                    <button type="submit" 
                            style="padding: 12px 32px; background: #1e293b; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 14px;">
                        Create Template & Build Form
                    </button>
                    <a href="{% url 'form_templates_list' %}"
                       style="padding: 12px 32px; background: white; border: 1px solid #e2e8f0; color: #475569; border-radius: 8px; text-decoration: none; font-weight: 500; font-size: 14px; display: inline-flex; align-items: center;">
                        Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
function toggleApproverRole() {
    const checkbox = document.getElementById('requires_approval');
    const field = document.getElementById('approver-role-field');
    field.style.display = checkbox.checked ? 'block' : 'none';
}
</script>
{% endblock %}
