{% extends 'ems/base_employee.html' %}

{% block title %}{{ template.title }} - EMS{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-content">
        <h1 class="page-title">{{ template.title }}</h1>
        <p class="page-subtitle">{{ template.description }}</p>
    </div>
    <div class="page-header-actions">
        <a href="{% url 'form_submissions_list' %}" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; color: #475569; text-decoration: none; font-size: 14px; font-weight: 500;">
            Back to My Forms
        </a>
    </div>
</div>

<div class="content-card">
    <div class="card-content">
        <form method="POST">
            {% csrf_token %}
            
            <div id="form-container" style="display: grid; gap: 20px;">
                <!-- Dynamic fields will be rendered here -->
            </div>
            
            <div style="display: flex; gap: 12px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #e2e8f0;">
                <button type="submit" name="action" value="draft" style="padding: 12px 32px; background: #64748b; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer;">
                    Save as Draft
                </button>
                <button type="submit" name="action" value="submit" style="padding: 12px 32px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer;">
                    Submit Form
                </button>
                <a href="{% url 'form_submissions_list' %}" style="padding: 12px 32px; background: white; border: 1px solid #e2e8f0; color: #475569; border-radius: 8px; text-decoration: none; font-weight: 500; display: inline-flex; align-items: center;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
const formFields = {{ template.form_fields|safe }};

function renderForm() {
    const container = document.getElementById('form-container');
    
    if (!formFields || !formFields.fields || formFields.fields.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 40px;">No fields defined in this form yet.</p>';
        return;
    }
    
    let html = '';
    
    formFields.fields.forEach(field => {
        const widthClass = field.width === 'half' ? 'grid-column: span 1;' : 'grid-column: span 2;';
        
        html += `<div style="${widthClass}">`;
        html += `<label style="display: block; margin-bottom: 8px; font-weight: 500; color: #1e293b;">`;
        html += field.label;
        if (field.required) {
            html += ' <span style="color: #ef4444;">*</span>';
        }
        html += `</label>`;
        
        const fieldName = field.id;
        const required = field.required ? 'required' : '';
        const placeholder = field.placeholder || '';
        
        switch(field.type) {
            case 'TEXT':
                html += `<input type="text" name="${fieldName}" placeholder="${placeholder}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">`;
                break;
            case 'TEXTAREA':
                html += `<textarea name="${fieldName}" rows="4" placeholder="${placeholder}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: inherit; resize: vertical;"></textarea>`;
                break;
            case 'NUMBER':
                html += `<input type="number" name="${fieldName}" placeholder="${placeholder}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">`;
                break;
            case 'EMAIL':
                html += `<input type="email" name="${fieldName}" placeholder="${placeholder}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">`;
                break;
            case 'DATE':
                html += `<input type="date" name="${fieldName}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">`;
                break;
            case 'CHECKBOX':
                html += `<label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">`;
                html += `<input type="checkbox" name="${fieldName}" ${required} style="width: 18px; height: 18px; cursor: pointer;">`;
                html += `<span style="color: #475569;">${placeholder || 'Check this box'}</span>`;
                html += `</label>`;
                break;
            case 'SELECT':
                html += `<select name="${fieldName}" ${required} style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px;">`;
                html += `<option value="">Select an option</option>`;
                if (field.options && field.options.length > 0) {
                    field.options.forEach(opt => {
                        html += `<option value="${opt}">${opt}</option>`;
                    });
                } else {
                    html += `<option value="Option 1">Option 1</option>`;
                    html += `<option value="Option 2">Option 2</option>`;
                }
                html += `</select>`;
                break;
            case 'SIGNATURE':
                html += `<div style="padding: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; text-align: center; color: #64748b;">`;
                html += `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin: 0 auto 8px;"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>`;
                html += `<p>Signature will be added after submission</p>`;
                html += `</div>`;
                break;
        }
        
        html += `</div>`;
    });
    
    container.innerHTML = html;
    container.style.display = 'grid';
    container.style.gridTemplateColumns = 'repeat(2, 1fr)';
    container.style.gap = '20px';
}

renderForm();
</script>
{% endblock %}
